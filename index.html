<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queless - Skip the Line</title>
    <meta name="description" content="Order ahead, pay instantly, and pick up your food without the wait. Experience the future of dining with Queless." />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Queless",
      "url": "https://queless.vercel.app/",
      "logo": "https://queless.vercel.app/logo.png",
      "description": "South Africa's premier alcohol and food delivery service. Order ahead, pay instantly, and skip the line.",
      "sameAs": [
        "https://twitter.com/queless",
        "https://facebook.com/queless",
        "https://instagram.com/queless"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Queless",
      "url": "https://queless.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://queless.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
